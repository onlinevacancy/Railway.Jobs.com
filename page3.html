<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">                                                                                                                                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>
                                                                                                                                                        <style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;                                                                                                                                           background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.logo {
  width: 80px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}                                                                                                                                                                                                                                                                                                               /* 🔥 Highlighted Pay Now Button */
.pay-btn {
  background: linear-gradient(45deg, #28a745, #00c851);
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 4px 12px rgba(0, 200, 81, 0.4);
  transition: 0.3s;
}

.pay-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 16px rgba(0, 200, 81, 0.6);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <img src="IMG_20260719_205000.png" class="logo">

  <h2 id="businessName"></h2>

  <p>Amount: ₹<span id="amount"></span></p>
  <p>Order ID: <span id="orderId"></span></p>

  <!-- QR -->
  <img id="qr" width="200">

  <p id="upiId"></p>

  <button onclick="copyUPI()">Copy UPI ID</button>

  <a id="payLink">
    <button class="pay-btn">💳 Pay Now</button>
  </a>

  <input type="text" id="utr" placeholder="Enter UTR Number">

  <button onclick="submitUTR()">I Have Paid</button>

  <p id="status"></p>
</div>

<script>
const BUSINESS_NAME = "SECURE PAYMENT GATEWAY";
const UPI_ID = "harishankaro@ptyes";
const AMOUNT = 349;

const orderId = "ORD" + Math.floor(Math.random()*1000000);

document.getElementById("businessName").innerText = BUSINESS_NAME;
document.getElementById("amount").innerText = AMOUNT;
document.getElementById("orderId").innerText = orderId;
document.getElementById("upiId").innerText = "UPI: " + UPI_ID;

const upiLink = `upi://pay?pa=${UPI_ID}&pn=${BUSINESS_NAME}&am=${AMOUNT}&cu=INR&tn=${orderId}`;

document.getElementById("payLink").href = upiLink;

// QR
document.getElementById("qr").src =
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;

function copyUPI() {
  navigator.clipboard.writeText(UPI_ID);
  alert("UPI ID copied!");
}

function submitUTR() {
  const utr = document.getElementById("utr").value;

  if (!utr) {
    alert("Enter UTR");
    return;
  }

  document.getElementById("status").innerText = "Processing...";

  fetch("http://localhost:3000/payment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ utr })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText = "Payment submitted!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "Error!";
  });
}
</script>
</body>
</html>
